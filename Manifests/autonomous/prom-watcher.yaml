apiVersion: v1
kind: ConfigMap
metadata:
  name: prom-autonomous-watcher
  namespace: kagent
  labels:
    demo: autonomous-sre
data:
  watcher.py: |
    #!/usr/bin/env python3
    """Poll Prometheus firing alerts and invoke local-sre via Kagent A2A."""
    import json
    import os
    import ssl
    import sys
    import time
    import urllib.parse
    import urllib.request

    PROM = os.environ["PROMETHEUS_URL"]
    KAGENT = os.environ["KAGENT_URL"]
    ROUTE_NS = os.environ.get("ROUTE_NAMESPACE", "demo-apps")
    ROUTE_NAME = os.environ.get("ROUTE_NAME", "shop-route")

    ALERT_PROMPTS = {
        "ShopApiCanaryHigh5xx": """AUTONOMOUS MODE — ShopApiCanaryHigh5xx alert firing (already confirmed by Prometheus).

    Call k8s_apply_manifest NOW with full HTTPRoute shop-route in demo-apps: v1=100, v2=0.
    Do NOT call prometheus_query or k8s_patch_resource. Alert is already verified.""",
        "ShopApiV2NotReady": """AUTONOMOUS MODE — ShopApiV2NotReady alert firing (already confirmed by Prometheus).

    Call k8s_apply_manifest NOW with full HTTPRoute shop-route in demo-apps: v1=100, v2=0.
    Do NOT call prometheus_query or k8s_patch_resource.""",
    }

    def prom_get(path):
        req = urllib.request.Request(PROM + path, method="GET")
        with urllib.request.urlopen(req, timeout=20) as resp:
            return json.load(resp)

    def get_firing_alertnames():
        data = prom_get("/api/v1/alerts")
        names = set()
        for alert in data.get("data", {}).get("alerts", []):
            if alert.get("state") == "firing":
                name = alert.get("labels", {}).get("alertname")
                if name:
                    names.add(name)
        return names

    def k8s_get_httproute_weights():
        """Return {serviceName: weight} for shop-route, or None if unavailable."""
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        if not os.path.exists(token_path):
            return None
        with open(token_path) as f:
            token = f.read()
        url = (
            "https://kubernetes.default.svc/apis/gateway.networking.k8s.io/v1/"
            f"namespaces/{ROUTE_NS}/httproutes/{ROUTE_NAME}"
        )
        req = urllib.request.Request(
            url,
            headers={"Authorization": f"Bearer {token}"},
            method="GET",
        )
        ctx = ssl.create_default_context(cafile=ca_path)
        with urllib.request.urlopen(req, context=ctx, timeout=15) as resp:
            data = json.load(resp)
        refs = data.get("spec", {}).get("rules", [{}])[0].get("backendRefs", [])
        return {ref.get("name"): ref.get("weight", 0) for ref in refs}

    def httproute_already_shifted():
        """True only when HTTPRoute weights are v1=100, v2=0 (actual agent remediation)."""
        weights = k8s_get_httproute_weights()
        if not weights:
            print("WARN: cannot read HTTPRoute weights — will not skip agent invoke")
            return False
        v1 = weights.get("shop-api-v1")
        v2 = weights.get("shop-api-v2")
        shifted = v1 == 100 and v2 == 0
        print(f"HTTPRoute weights: v1={v1} v2={v2} shifted={shifted}")
        return shifted

    def apply_httproute_shift():
        """SOP remediation: shift shop-route to v1=100, v2=0 (JSON patch)."""
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        patch = [
            {"op": "replace", "path": "/spec/rules/0/backendRefs/0/weight", "value": 100},
            {"op": "replace", "path": "/spec/rules/0/backendRefs/1/weight", "value": 0},
        ]
        with open(token_path) as f:
            token = f.read()
        url = (
            "https://kubernetes.default.svc/apis/gateway.networking.k8s.io/v1/"
            f"namespaces/{ROUTE_NS}/httproutes/{ROUTE_NAME}"
        )
        req = urllib.request.Request(
            url,
            data=json.dumps(patch).encode(),
            headers={
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json-patch+json",
            },
            method="PATCH",
        )
        ctx = ssl.create_default_context(cafile=ca_path)
        with urllib.request.urlopen(req, context=ctx, timeout=30) as resp:
            resp.read()
        print(f"Applied HTTPRoute patch: {ROUTE_NS}/{ROUTE_NAME} v1=100 v2=0")

    def invoke_agent(alertname, prompt):
        session = f"auto-{alertname.lower()}-{int(time.time())}"
        payload = {
            "jsonrpc": "2.0",
            "method": "message/stream",
            "id": 1,
            "params": {
                "message": {
                    "role": "user",
                    "parts": [{"kind": "text", "text": prompt}],
                    "messageId": f"auto-msg-{session}",
                    "contextId": session,
                }
            },
        }
        req = urllib.request.Request(
            f"{KAGENT}/api/a2a/kagent/local-sre",
            data=json.dumps(payload).encode(),
            headers={
                "Content-Type": "application/json",
                "Accept": "text/event-stream",
            },
            method="POST",
        )
        print(f"Invoking local-sre for {alertname} session={session}")
        with urllib.request.urlopen(req, timeout=900) as resp:
            for _ in resp:
                pass
        print("Done.")

    def main():
        firing = get_firing_alertnames()
        supported = set(ALERT_PROMPTS.keys())
        matched = firing & supported
        if not matched:
            print(f"No supported firing alerts (firing={firing or 'none'})")
            return

        if httproute_already_shifted():
            print("HTTPRoute already v1=100 v2=0 — skip agent invoke")
            return

        # One alert per run — prefer 5xx over not-ready
        for name in ("ShopApiCanaryHigh5xx", "ShopApiV2NotReady"):
            if name in matched:
                invoke_agent(name, ALERT_PROMPTS[name])
                if httproute_already_shifted():
                    print("HTTPRoute shifted by agent")
                else:
                    print(
                        "Agent did not patch route — applying SOP traffic-shift directly"
                    )
                    apply_httproute_shift()
                    httproute_already_shifted()
                return

    if __name__ == "__main__":
        try:
            main()
        except Exception as exc:
            print(f"ERROR: {exc}", file=sys.stderr)
            sys.exit(1)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prom-watcher
  namespace: kagent
  labels:
    demo: autonomous-sre
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prom-watcher-read-routes
  namespace: demo-apps
  labels:
    demo: autonomous-sre
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prom-watcher-read-routes
  namespace: demo-apps
  labels:
    demo: autonomous-sre
subjects:
  - kind: ServiceAccount
    name: prom-watcher
    namespace: kagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prom-watcher-read-routes
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: shop-canary-prom-watcher
  namespace: kagent
  labels:
    demo: autonomous-sre
spec:
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 900
      template:
        spec:
          serviceAccountName: prom-watcher
          restartPolicy: Never
          containers:
            - name: watcher
              image: python:3.12-slim
              env:
                - name: PROMETHEUS_URL
                  value: http://prom-kube-prometheus-stack-prometheus.monitoring.svc:9090
                - name: KAGENT_URL
                  value: http://kagent-controller.kagent.svc.cluster.local:8083
              command:
                - python3
                - /scripts/watcher.py
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: prom-autonomous-watcher
                defaultMode: 0555
