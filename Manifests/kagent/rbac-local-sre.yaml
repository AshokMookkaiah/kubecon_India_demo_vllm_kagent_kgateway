apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: local-sre-remediation
  namespace: demo-apps
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kagent-tools-local-sre
  namespace: demo-apps
subjects:
  # Default SA for kagent-tools Helm chart — adjust if your cluster differs.
  - kind: ServiceAccount
    name: kagent-tools
    namespace: kagent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: local-sre-remediation
