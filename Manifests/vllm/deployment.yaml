apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-cpu
  namespace: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: <add your dedicated node name for VLLM>
      tolerations:
        - key: workload
          operator: Equal
          value: vllm
          effect: NoSchedule
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
        - name: vllm
          image: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:latest
          command: ["/bin/sh", "-c"]
          args:
            - >
              vllm serve Qwen/Qwen2.5-7B-Instruct
              --host 0.0.0.0 --port 8000
              --max-model-len 8192
              --max-num-seqs 2
              --enable-auto-tool-choice
              --tool-call-parser hermes
          env:
            # KV cache (GB). 8192 context on 7B needs ~20 GiB with weights on 64 GiB node.
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "20"
            - name: VLLM_CPU_OMP_THREADS_BIND
              value: "auto"
            - name: VLLM_CPU_NUM_OF_RESERVED_CPU
              value: "2"
            - name: KMP_BLOCKTIME
              value: "5"
          securityContext:
            capabilities:
              add:
                - SYS_NICE
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 300
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: "25"
              memory: 48Gi
            limits:
              cpu: "29"
              memory: 58Gi
          volumeMounts:
            - name: cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
